<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carueeb – Connexion</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Roboto,Arial,sans-serif;
  background:linear-gradient(180deg,#1c2f4a,#0e1725);
  color:white;
  height:100vh;
  overflow:auto;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  padding:30px 20px;
}

.container{
  width:100%;
  max-width:360px;
  display:flex;
  flex-direction:column;
  gap:16px;
  position:relative;
}

h1{
  text-align:center;
  margin-bottom:10px;
  font-size:24px;
}

input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:2px solid rgba(255,255,255,0.2);
  outline:none;
  font-size:16px;
  background:rgba(255,255,255,0.05);
  color:white;
  transition:0.2s;
}

input.valid{
  border:2px solid #00ff88;
}

input.invalid{
  border:2px solid red;
}

.toggle-password{
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  opacity:0.8;
}

button{
  margin-top:10px;
  align-self:center;
  padding:12px 26px;
  border-radius:25px;
  border:none;
  background:#f2a64a;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  opacity:0.9;
}

button:hover{
  background:#d1842d;
}

#forgotBtn{
  margin-top:6px;
  background:transparent;
  color:#f2a64a;
  font-size:14px;
  opacity:0.8;
}

#forgotBtn:hover{
  text-decoration:underline;
}

.message{
  text-align:center;
  font-size:13px;
  margin-top:5px;
  color:red;
  min-height:18px;
}

.text-link{
  text-align:center;
  margin-top:16px;
  font-size:13px;
  opacity:0.8;
}
.text-link a{
  color:#f2a64a;
  text-decoration:none;
  font-weight:bold;
}
.text-link a:hover{
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="container">

<h1>Connexion</h1>

<div class="input-box" style="position:relative;">
<input type="text" id="email" placeholder="Email ou Numéro">
</div>

<div class="input-box" style="position:relative;">
<input type="password" id="password" placeholder="Mot de passe">
<span class="toggle-password" onclick="togglePassword()">👁️</span>
</div>

<button id="loginBtn" onclick="loginUser()">Connexion</button>
<button id="forgotBtn" onclick="forgotPassword()">Mot de passe oublié ?</button>

<div id="message" class="message"></div>

<div class="text-link">
Vous n'avez pas de compte ? <a href="creer_compte.html">Créer un compte</a>
</div>

</div>

<script>
// 🔑 Firebase config réel
const firebaseConfig = {
  apiKey: "AIzaSyANsqKxuq77mO9oV77TULTsx0owa4YhEiY",
  authDomain: "carueeb-d4d67.firebaseapp.com",
  projectId: "carueeb-d4d67",
  storageBucket: "carueeb-d4d67.firebasestorage.app",
  messagingSenderId: "901716304727",
  appId: "1:901716304727:web:e4b09263f14f4ae02b1412",
  measurementId: "G-Q3MKYYN24N"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Elements
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const message = document.getElementById('message');

// Toggle mot de passe
function togglePassword(){
  const pwd=passwordInput;
  pwd.type = pwd.type==='password'?'text':'password';
}

// Validation champs
function validateFields(){
  let valid = true;

  if(emailInput.value.trim().length<3){
    emailInput.classList.add("invalid");
    emailInput.classList.remove("valid");
    valid=false;
  }else{
    emailInput.classList.add("valid");
    emailInput.classList.remove("invalid");
  }

  if(passwordInput.value.trim().length<3){
    passwordInput.classList.add("invalid");
    passwordInput.classList.remove("valid");
    valid=false;
  }else{
    passwordInput.classList.add("valid");
    passwordInput.classList.remove("invalid");
  }

  return valid;
}

// Connexion utilisateur
function loginUser(){
  message.innerText="";
  if(!validateFields()){
    message.innerText="Veuillez remplir tous les champs correctement";
    return;
  }

  auth.signInWithEmailAndPassword(emailInput.value,passwordInput.value)
  .then(()=>{
    message.style.color="#00ff88";
    message.innerText="Connexion réussie !";
    setTimeout(()=>{ window.location.href="feed.html"; },1000);
  })
  .catch(err=>{
    message.style.color="red";
    if(err.code==='auth/user-not-found'){
      message.innerText="Aucun compte trouvé avec cet email";
    }else if(err.code==='auth/wrong-password'){
      message.innerText="Mot de passe incorrect";
    }else{
      message.innerText=err.message;
    }
  });
}

// Mot de passe oublié
function forgotPassword(){
  message.style.color="red";
  if(!emailInput.value){
    message.innerText="Veuillez entrer votre email pour récupérer le mot de passe";
    return;
  }
  auth.sendPasswordResetEmail(emailInput.value)
  .then(()=>{
    message.style.color="#00ff88";
    message.innerText="Email de récupération envoyé !";
  })
  .catch(err=>{
    message.style.color="red";
    message.innerText=err.message;
  });
}

// Validation en temps réel
emailInput.addEventListener("input",validateFields);
passwordInput.addEventListener("input",validateFields);

</script>

</body>
</html>
