<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carueeb - Login</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif; }

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top, #A7D8F5 0%, #3D5AFE 100%);
  overflow:hidden;
}

.container { text-align:center; }

.logo {
  font-size:90px;
  font-weight:700;
  color:white;
  transform:scale(0.95);
  opacity:0;
  animation:logoAnim 1s ease forwards;
  text-shadow:8px 10px 20px rgba(0,0,0,0.25);
}

.brand {
  margin-top:12px;
  font-size:20px;
  font-weight:500;
  letter-spacing:0.02em;
  color:#F2F2F2;
  opacity:0;
  animation:textAnim 1s ease forwards;
  animation-delay:0.3s;
}

.pagination {
  position:absolute;
  bottom:40px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.4); }
.dot.active { background:white; }

@keyframes logoAnim { to { transform:scale(1); opacity:1; } }
@keyframes textAnim { to { opacity:1; } }

.fade-out { animation:fadeOut 0.3s ease forwards; }
@keyframes fadeOut { to { opacity:0; transform:translateX(-10px); } }
</style>
</head>

<body>

<div class="container" id="splashContainer">
  <div class="logo">C</div>
  <div class="brand">carueeb</div>
</div>

<div class="pagination">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<script>
// Redirection après 6 secondes vers choice.html
setTimeout(() => {
  const container = document.getElementById("splashContainer");
  container.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = "choice.html";
  }, 300);

}, 6000);
</script>

</body>
</html>
