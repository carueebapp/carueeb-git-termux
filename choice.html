<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carueeb – Choix</title>
<style>
:root{
  /* Couleur des boutons configurable depuis color.css */
  --color-btn: #f2a64a; /* temporaire, sera remplacée par color.css */
  --color-btn-hover: #d1842d;
}

body{
  margin:0;
  font-family:Roboto,Arial,sans-serif;
  background:linear-gradient(180deg,#1c2f4a,#0e1725);
  color:white;
  height:100vh;
  width:100vw;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden; /* pas de scroll */
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  width:100%;
  gap:30px; /* espace entre les boutons */
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:40px;
}

.button{
  width:220px;
  padding:16px 0;
  border-radius:25px;
  border:none;
  background:var(--color-btn);
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  transition:0.2s;
}

.button:hover{
  background:var(--color-btn-hover);
}
</style>
</head>
<body>

<div class="container">
  <h1>Bienvenue sur Carueeb</h1>
  <a href="creer_compte.html" class="button">Créer un compte</a>
  <a href="connexion.html" class="button">Connexion</a>
</div>

</body>
</html>
